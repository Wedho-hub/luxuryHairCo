name = "luxury-hair-co"
main = "frontend/dist/index.js"
compatibility_date = "2024-01-01"

[build]
command = "npm run build"
cwd = "./frontend"

[build.environment]
NODE_VERSION = "20.19.0"

[env.production]
routes = [
  { pattern = "example.com", zone_name = "example.com" }
]

[[routes]]
pattern = "/*"
fallback = { status = 200, path = "/index.html" }
